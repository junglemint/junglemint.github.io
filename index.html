<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>원뿔 곡선 — 시각화</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #ffffff;
      color: #1a1d2e;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* 배경 애니메이션 */
    .bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* 헤더 */
    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 4vh 20px 2.4vh;
    }

    header h1 {
      font-size: 9.6vw;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: #1a1d2e;
      margin-bottom: 1.6vh;
    }

    header h1 span {
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      font-size: 2.24vw;
      color: #4a5080;
      max-width: 64vw;
      margin: 0 auto;
      line-height: 1.8;
    }

    /* 카드 그리드 */
    .cards {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.6vh;
      max-width: 70vw;
      margin: 1.6vh auto;
      padding: 0;
      width: 100%;
    }

    .card {
      background: #f4f6fb;
      border: 1px solid #dde1f0;
      border-radius: 16px;
      padding: 4vh 4vw;
      transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: #9fa8da;
      box-shadow: 0 20px 60px rgba(90, 100, 180, 0.15);
    }

    .card-icon {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin-bottom: 20px;
    }

    .card-icon.blue   { background: rgba(96, 165, 250, 0.15); color: #60a5fa; }
    .card-icon.purple { background: rgba(167, 139, 250, 0.15); color: #a78bfa; }
    .card-icon.pink   { background: rgba(244, 114, 182, 0.15); color: #f472b6; }

    .card h2 {
      font-size: 2.8vw;
      font-weight: 600;
      color: #1a1d2e;
      margin-bottom: 20px;
    }

    .card p {
      font-size: 1.76vw;
      color: #4a5080;
      line-height: 1.7;
    }

    .card .tag {
      display: inline-block;
      margin-top: 32px;
      padding: 8px 24px;
      font-size: 1.1rem;
      border-radius: 20px;
      background: #dde1f0;
      color: #5c6bc0;
    }

    /* 수식 장식 */
    .equation-bar {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 1.6vh 20px;
      font-size: 1.6vw;
      color: #8890b8;
      letter-spacing: 0.05em;
      font-family: 'Georgia', serif;
      font-style: italic;
    }

    /* 푸터 */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 1.6vh 20px 3.2vh;
      color: #8890b8;
      font-size: 1.28vw;
    }

    footer a {
      color: #60a5fa;
      text-decoration: none;
    }

    @media (max-width: 640px) {
      header h1 { font-size: 2rem; }
      header { padding: 50px 16px 24px; }
      .cards { margin: 40px auto; gap: 20px; }
      .card { padding: 28px 24px; }
    }
  </style>
</head>
<body>

<canvas class="bg-canvas" id="bgCanvas"></canvas>

<header>
  <h1><span>원뿔 곡선</span></h1>
  <p>
    원뿔 곡선을 직관적으로 탐구합니다.<br>
    이차곡선, 직선, 점이 어떻게 만들어지는지 눈으로 확인하세요.
  </p>
</header>

<div class="cards">

  <a class="card" href="conic_sections.html">
<h2>원뿔 곡선 (Conic Sections)</h2>
    <p>
      원뿔을 평면으로 자를 때 나타나는 단면을 3D로 확인합니다.<br>
      슬라이더로 절단 각도를 조절하며 원, 타원, 포물선, 쌍곡선이 만들어지는 과정을 관찰하세요.
    </p>
    <span class="tag">3D 인터랙티브</span>
  </a>

</div>

<div class="equation-bar">
  Ax² + Bxy + Cy² + Dx + Ey + F = 0
</div>

<footer>
  <p>© 2026 수학 시각화 프로젝트 · <a href="https://github.com/junglemint/ha.github.io">GitHub</a></p>
</footer>

<script>
// 배경: 느리게 떠다니는 점들
(function () {
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let w, h, particles;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }

  function init() {
    resize();
    particles = [];
    const count = Math.floor((w * h) / 18000);
    for (let i = 0; i < count; i++) {
      particles.push({
        x: Math.random() * w,
        y: Math.random() * h,
        r: Math.random() * 1.5 + 0.5,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        alpha: Math.random() * 0.4 + 0.1,
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0) p.x = w;
      if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h;
      if (p.y > h) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(90, 100, 180, ${p.alpha * 1.1})`;
      ctx.fill();
    }

    // 가까운 점 사이 연결선
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = dx * dx + dy * dy;
        if (dist < 12000) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(90, 100, 180, ${0.088 * (1 - dist / 12000)})`;
          ctx.stroke();
        }
      }
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); });
  init();
  draw();
})();
</script>

</body>
</html>
